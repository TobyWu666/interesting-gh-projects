<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Git趣，收集有趣 GitHub 專案心得、測試紀錄與推薦文章。">
  <title>Git趣</title>
  <link rel="stylesheet" href="assets/styles.css?v=legal-20260514">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8039075010791741" crossorigin="anonymous"></script>
</head>
<body>
  <div class="page-with-rails">
    <!-- Ad: Left Side Rail -->
    <aside class="ad-rail ad-rail-left" aria-label="廣告">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8039075010791741"
           data-ad-slot="XXXXXXXXXX"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>

    <div class="page-core">
      <header class="site-header">
        <nav class="topbar" aria-label="主要導覽">
          <a class="brand" href="./" aria-label="回到 Git趣首頁">
            <span class="brand-mark" aria-hidden="true">GQ</span>
            <span>Git趣</span>
          </a>
          <label class="top-search" for="searchInput">
            <span>搜尋</span>
            <input id="searchInput" type="search" placeholder="找專案、tag、語言" autocomplete="off">
          </label>
        </nav>

        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">GitHub Curiosity Notes</p>
            <h1>有趣專案的心得筆記，先看推薦，再翻最近更新。</h1>
            <p class="hero-text">把每天挖到的 GitHub 專案整理成好讀的文章，而不是一堆冷冰冰的連結。</p>
          </div>
          <div class="hero-panel" aria-label="資料摘要">
            <div>
              <span id="projectCount">0</span>
              <small>篇文章</small>
            </div>
            <div>
              <span id="tagCount">0</span>
              <small>個 tag</small>
            </div>
            <div>
              <span id="lastUpdated">-</span>
              <small>最近更新</small>
            </div>
          </div>
        </section>
      </header>

      <main>
        <section class="tag-band" aria-label="Tag 分類">
          <div class="section-label">
            <span>Tags</span>
            <p id="resultMeta">正在載入資料</p>
          </div>
          <div class="tag-strip" id="tagStrip"></div>
        </section>

        <section class="feature-layout">
          <div>
            <div class="section-head">
              <span>Recommended</span>
              <h2>推薦文章</h2>
            </div>
            <div class="featured-list" id="featuredList" aria-live="polite"></div>
          </div>

          <aside class="latest-panel" aria-label="最近更新">
            <div class="section-head">
              <span>Fresh Notes</span>
              <h2>最近更新</h2>
            </div>
            <div class="latest-list" id="latestList"></div>
          </aside>
        </section>

        <section class="section-head all-head">
          <span>Archive</span>
          <h2>全部文章</h2>
        </section>
        <section class="project-grid" id="projectGrid" aria-live="polite"></section>
        <p class="empty-state" id="emptyState" hidden>找不到符合條件的文章。</p>
      </main>

      <footer class="site-footer">
        <span>© 2026 Git趣 — TobyWu</span>
        <nav class="footer-links" aria-label="法律頁面">
          <a href="privacy.html">隱私政策</a>
          <a href="terms.html">使用條款</a>
        </nav>
      </footer>
    </div>

    <!-- Ad: Right Side Rail -->
    <aside class="ad-rail ad-rail-right" aria-label="廣告">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8039075010791741"
           data-ad-slot="XXXXXXXXXX"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </aside>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
